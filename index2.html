<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spotify Downloader</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1db954, #191414);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      background: rgba(0,0,0,0.6);
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 20px;
      color: #1db954;
    }

    input {
      width: 90%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
      outline: none;
    }

    button {
      background: #1db954;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      color: white;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background: #17a74a;
    }

    #result {
      margin-top: 15px;
      font-size: 14px;
    }

    .loader {
      border: 4px solid #fff;
      border-top: 4px solid #1db954;
      border-radius: 50%;
      width: 25px;
      height: 25px;
      animation: spin 1s linear infinite;
      margin: 10px auto;
      display: none;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    a {
      color: #1db954;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Spotify Downloader 🎧</h1>

  <input type="text" id="songLink" placeholder="Paste Spotify song link">

  <button onclick="downloadSong()">Download</button>

  <div class="loader" id="loader"></div>

  <p id="result"></p>
</div>

<script>
function downloadSong() {
  let link = document.getElementById("songLink").value.trim();
  let result = document.getElementById("result");
  let loader = document.getElementById("loader");

  if (link === "") {
    alert("⚠️ Please enter a Spotify link");
    return;
  }

  if (!link.includes("spotify.com")) {
    alert("❌ Invalid Spotify link");
    return;
  }

  loader.style.display = "block";
  result.innerText = "";

  setTimeout(() => {
    loader.style.display = "none";

    result.innerHTML = `
      ✅ Download Ready! <br><br>
      <a href="${link}" target="_blank">Click here to open song</a>
    `;
  }, 2000);
}
</script>

</body>
</html>
