<!DOCTYPE html>
<html>
<head>
  <title>Song Player</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding-top: 80px;
    }

    input {
      padding: 10px;
      width: 280px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .box {
      margin-top: 30px;
    }

    img {
      width: 150px;
      border-radius: 10px;
    }

    audio {
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h2>🎵 Simple Song Player</h2>

  <input id="link" placeholder="Paste Spotify link">
  <button onclick="getSong()">Play</button>

  <div class="box" id="result"></div>

  <script>
    async function getSong() {
      let link = document.getElementById("link").value;

      if (!link.includes("track")) {
        alert("Enter valid link");
        return;
      }

      let id = link.split("/track/")[1].split("?")[0];

      let res = await fetch(`https://spotify23.p.rapidapi.com/tracks/?ids=${id}`, {
        method: "GET",
        headers: {
          "X-RapidAPI-Key": "YOUR_API_KEY",
          "X-RapidAPI-Host": "spotify23.p.rapidapi.com"
        }
      });

      let data = await res.json();
      let song = data.tracks[0];

      document.getElementById("result").innerHTML = `
        <h3>${song.name}</h3>
        <p>${song.artists[0].name}</p>
        <img src="${song.album.images[0].url}">
        <br>
        ${song.preview_url 
          ? `<audio controls src="${song.preview_url}"></audio>` 
          : "No preview available"}
      `;
    }
  </script>

</body>
</html>
